name: checks

on:
  push:
  pull_request:

jobs:
  python:
    runs-on: ubuntu-latest
    steps:
      - uses: actions/checkout@v4
      - uses: actions/setup-python@v5
        with:
          python-version: "3.x"
      - run: python3 reliability_demo.py --self-test
      - run: python3 reliability_demo.py examples/model_outputs.jsonl
      - run: python3 structured_output_canary.py --self-test
      - run: python3 structured_output_canary.py examples/canary_outputs.jsonl
      - run: python3 protected_path_proof.py --self-test
      - run: python3 protected_path_proof.py examples/protected_path_cases.jsonl
      - run: python3 -m py_compile reliability_demo.py
      - run: python3 -m py_compile structured_output_canary.py
      - run: python3 -m py_compile protected_path_proof.py
